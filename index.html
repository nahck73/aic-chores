<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AIC Chore Tracker</title>
<style>
  :root {
    --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#0F6E56;
    --amber-light:#FAEEDA;--amber-dark:#854F0B;
    --bg:#f5f5f3;--card:#ffffff;--border:rgba(0,0,0,0.1);
    --text:#1a1a18;--muted:#6b6b68;--hint:#9a9a97;
    --radius:12px;--radius-sm:8px;
  }
  @media(prefers-color-scheme:dark){
    :root{--bg:#1c1c1a;--card:#2a2a28;--border:rgba(255,255,255,0.1);--text:#f0f0ee;--muted:#a0a09d;--hint:#6a6a68;}
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
  .app{max-width:440px;margin:0 auto;padding:0 0 80px}
  .screen{display:none;padding:1rem}
  .screen.active{display:block}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1rem 0}
  .topbar-title{font-size:17px;font-weight:600;color:var(--text)}
  .topbar-sub{font-size:12px;color:var(--muted);margin-top:1px}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 10px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;gap:4px}
  .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
  .avatar-lg{width:56px;height:56px;font-size:18px}
  .login-wrap{padding:1.5rem 1rem}
  .login-logo{font-size:22px;font-weight:700;color:var(--text);margin-bottom:4px}
  .login-sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem}
  .staff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:12px}
  .staff-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;cursor:pointer;transition:transform 0.1s}
  .staff-btn:active{transform:scale(0.97)}
  .staff-btn.unavail{opacity:0.35;pointer-events:none}
  .staff-btn-name{font-size:14px;font-weight:600;color:var(--text);margin-top:8px}
  .staff-btn-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .admin-btn{width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius-sm);padding:11px;cursor:pointer;font-size:13px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:6px}
  .prog-bar-wrap{background:var(--border);border-radius:99px;height:5px;margin-bottom:4px;overflow:hidden}
  .prog-bar{height:5px;border-radius:99px;background:var(--green);transition:width 0.4s ease}
  .prog-label{font-size:12px;color:var(--muted)}
  .section-hdr{font-size:11px;font-weight:600;color:var(--hint);text-transform:uppercase;letter-spacing:0.07em;margin:1.25rem 0 6px}
  .chore-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background 0.1s}
  .chore-card:active{background:var(--bg)}
  .chore-card.done{opacity:0.5}
  .chore-card.done .chore-label{text-decoration:line-through;color:var(--hint)}
  .chore-card.readonly{cursor:default}
  .chk{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 0.15s,border-color 0.15s}
  .chk.on{background:var(--green);border-color:var(--green)}
  .chk svg{display:none;width:13px;height:13px;stroke:white;stroke-width:2.5;fill:none}
  .chk.on svg{display:block}
  .chore-label{font-size:14px;color:var(--text);flex:1;line-height:1.3}
  .pill{font-size:11px;padding:3px 8px;border-radius:99px;flex-shrink:0;font-weight:500}
  .pill-daily{background:var(--green-light);color:var(--green-dark)}
  .pill-weekly{background:var(--amber-light);color:var(--amber-dark)}
  .stats-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:1rem}
  .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .stat-val{font-size:24px;font-weight:700;color:var(--text)}
  .stat-lbl{font-size:12px;color:var(--muted);margin-top:2px}
  .staff-row{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
  .sr-info{flex:1}
  .sr-name{font-size:14px;font-weight:600;color:var(--text)}
  .sr-detail{font-size:12px;color:var(--muted);margin-top:1px}
  .sr-right{text-align:right;min-width:48px}
  .sr-pct{font-size:14px;font-weight:600;color:var(--text)}
  .sr-bar-wrap{width:48px;background:var(--border);border-radius:99px;height:3px;margin-top:3px;overflow:hidden}
  .sr-bar{height:3px;border-radius:99px;background:var(--green)}
  .date-nav{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
  .date-nav-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;color:var(--text)}
  .date-nav-label{flex:1;text-align:center;font-size:14px;font-weight:500;color:var(--text)}
  .rotate-btn{width:100%;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px;cursor:pointer;font-size:13px;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:6px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--card);font-size:13px;padding:9px 18px;border-radius:99px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:100;white-space:nowrap}
  .toast.show{opacity:1}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;margin-left:6px}
  .sync-dot.syncing{background:#EF9F27;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
</style>
</head>
<body>
<div class="app">
  <!-- LOGIN -->
  <div class="screen active" id="screenLogin">
    <div class="login-wrap">
      <div class="login-logo">Advanced Implant Centers</div>
      <div class="login-sub" id="loginDate"></div>
      <div class="staff-grid" id="staffGrid"></div>
      <button class="admin-btn" onclick="showAdminLogin()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin / Dr. Brian
      </button>
    </div>
  </div>

  <!-- ADMIN PASSWORD MODAL -->
  <div id="adminModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem">
    <div style="background:var(--card);border-radius:var(--radius);padding:1.5rem;width:100%;max-width:320px">
      <div style="font-size:17px;font-weight:600;color:var(--text);margin-bottom:6px">Admin login</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:1rem">Enter the admin password to continue</div>
      <input id="adminPwInput" type="password" placeholder="Password"
        style="width:100%;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:15px;background:var(--bg);color:var(--text);margin-bottom:8px"
        onkeydown="if(event.key==='Enter')checkAdminPw()">
      <div id="adminPwError" style="font-size:12px;color:#E24B4A;margin-bottom:8px;display:none">Incorrect password — try again</div>
      <button onclick="checkAdminPw()" style="width:100%;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);padding:11px;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:8px">Enter</button>
      <button onclick="closeAdminModal()" style="width:100%;background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;font-size:14px;cursor:pointer;color:var(--muted)">Cancel</button>
    </div>
  </div>

  <!-- STAFF -->
  <div class="screen" id="screenStaff">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="staffName"></div>
        <div class="topbar-sub" id="staffDate"></div>
      </div>
      <div class="topbar-right">
        <div class="avatar" id="staffAvatar"></div>
        <button class="icon-btn" onclick="logout()">Sign out</button>
      </div>
    </div>
    <div style="padding:1rem 1rem 0">
      <div class="prog-bar-wrap"><div class="prog-bar" id="staffProg" style="width:0%"></div></div>
      <div class="prog-label" id="staffProgLabel"></div>
    </div>
    <div style="padding:0 1rem" id="staffChores"></div>
  </div>

  <!-- ADMIN -->
  <div class="screen" id="screenAdmin">
    <div class="topbar">
      <div>
        <div class="topbar-title">Admin overview <span class="sync-dot" id="syncDot"></span></div>
        <div class="topbar-sub" id="adminDateSub"></div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="logout()">Sign out</button>
      </div>
    </div>
    <div style="padding:0.75rem 1rem">
      <div class="date-nav">
        <button class="date-nav-btn" onclick="changeDate(-1)">‹</button>
        <div class="date-nav-label" id="adminDateNav"></div>
        <button class="date-nav-btn" onclick="changeDate(1)">›</button>
      </div>
      <div class="stats-row" id="adminStats"></div>
      <button class="rotate-btn" onclick="rotateAssign()">↻ Rotate weekly assignments</button>
      <div class="section-hdr">Staff status</div>
      <div id="adminStaffRows"></div>
      <div class="section-hdr" style="margin-top:1.5rem">All tasks</div>
      <div id="adminAllTasks"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CREDENTIALS ────────────────────────────────────────────
const SB_URL = "https://fbdkneqzjfjsdflzcsvy.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZiZGtuZXF6amZqc2RmbHpjc3Z5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3NzU2OTEsImV4cCI6MjA5NzM1MTY5MX0.FUFRlvxGnBUZbQrlmFXPR2x-U-LnxfPr9JE2pwzmryg";
const ADMIN_PASSWORD = "AIC2024";

// ── STAFF & CHORE CONFIG ───────────────────────────────────
const STAFF = [
  {id:'osmani', name:'Osmani', pt:false, bg:'#EEEDFE', fg:'#3C3489', initials:'OS'},
  {id:'shawna', name:'Shawna', pt:false, bg:'#E1F5EE', fg:'#085041', initials:'SW'},
  {id:'chrissy',name:'Chrissy',pt:false, bg:'#FAECE7', fg:'#712B13', initials:'CH'},
  {id:'autumn', name:'Autumn', pt:false, bg:'#FBEAF0', fg:'#72243E', initials:'AU'},
  {id:'jessica',name:'Jessica',pt:true,  bg:'#F1EFE8', fg:'#444441', initials:'JE'},
];
const OPS = ['Op 1','Op 2','Op 3','Op 4','Op 5','Op 6'];
const OP_TASKS = [
  'Check & fill water',
  'Remove trash',
  'Restock soap, gloves & paper towels',
  'Sweep & mop floors',
];
const COMMON_TASKS = [
  {id:'tk',  label:'Remove trash — kitchen',               freq:'daily'},
  {id:'tl',  label:'Remove trash — lobby & front area',    freq:'daily'},
  {id:'tbs', label:'Remove trash — staff bathroom',        freq:'daily'},
  {id:'tbp', label:'Remove trash — patient bathroom',      freq:'daily'},
  {id:'sbs', label:'Restock soap & towels — staff bathroom',   freq:'daily'},
  {id:'sbp', label:'Restock soap & towels — patient bathroom', freq:'daily'},
  {id:'ac',  label:'Flush & clean autoclave',              freq:'weekly'},
];

// ── STATE ──────────────────────────────────────────────────
let currentUser = null;
let currentDate = todayStr();
let rotOffset = parseInt(localStorage.getItem('aic_rot')||'0');
let checked = {};
let pollTimer = null;
let pendingChores = new Map(); // choreId -> expected done state
let syncTicket = 0;
let isSaving = false;

// ── REST API ───────────────────────────────────────────────
async function dbGet(date) {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/chore_checks?date=eq.${date}&done=eq.true`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if (!res.ok) {
      console.error('dbGet error:', res.status, await res.text());
      return null;
    }
    const rows = await res.json();
    const result = {};
    rows.forEach(r => { result[r.chore_id] = true; });
    return result;
  } catch(e) { console.error('dbGet fetch error:', e); return null; }
}

async function dbSet(date, choreId, done) {
  try {
    const res = await fetch(
      `${SB_URL}/rest/v1/chore_checks?on_conflict=date,chore_id`,
      {
        method: 'POST',
        headers: {
          'apikey': SB_KEY,
          'Authorization': 'Bearer ' + SB_KEY,
          'Content-Type': 'application/json',
          'Prefer': 'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify({ date, chore_id: choreId, done })
      }
    );
    if (!res.ok) {
      const txt = await res.text();
      console.error('dbSet error:', res.status, txt);
    }
    return res.ok;
  } catch(e) { console.error('dbSet fetch error:', e); return false; }
}

// ── POLLING FOR SYNC ───────────────────────────────────────
function mergePollState(fresh) {
  for (const [choreId, expected] of pendingChores) {
    if (!!fresh[choreId] === expected) pendingChores.delete(choreId);
  }
  Object.keys(fresh).forEach(k => { if (!pendingChores.has(k)) checked[k] = true; });
  Object.keys(checked).forEach(k => { if (!fresh[k] && !pendingChores.has(k)) delete checked[k]; });
}
function setSyncStatus(ok, syncing) {
  const dot = document.getElementById('syncDot');
  if (!dot) return;
  dot.classList.toggle('syncing', !!syncing);
  if (!syncing) dot.style.background = ok ? 'var(--green)' : '#E24B4A';
}
async function pullSync() {
  if (!currentUser) return;
  const ticket = syncTicket;
  if (currentUser !== 'admin') currentDate = todayStr();
  const fresh = await dbGet(currentDate);
  if (ticket !== syncTicket) return;
  if (fresh === null) { setSyncStatus(false, false); return; }
  mergePollState(fresh);
  refreshCurrentView();
  setSyncStatus(true, false);
}
function startPolling() {
  stopPolling();
  pullSync();
  pollTimer = setInterval(() => { if (!isSaving) pullSync(); }, 3000);
}
function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ── DATE UTILS ─────────────────────────────────────────────
function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function todayStr() { return fmtDate(new Date()); }
function dateLabel(ds) {
  return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
}
function dateLabelShort(ds) {
  return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
function dow(ds) { return new Date(ds+'T12:00:00').getDay(); }
function addDays(ds,n) {
  const d = new Date(ds+'T12:00:00'); d.setDate(d.getDate()+n); return fmtDate(d);
}
function weekNum(ds) {
  const d = new Date(ds+'T12:00:00');
  const jan1 = new Date(d.getFullYear(),0,1);
  return Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7);
}
function isJessicaDay(ds) { const d=dow(ds); return d===1||d===3; }

// ── ASSIGNMENT LOGIC ───────────────────────────────────────
function availableStaff(ds) { return STAFF.filter(s=>s.id!=='jessica'||isJessicaDay(ds)); }
function assignOps(ds,rot) {
  const avail=availableStaff(ds);
  const seed=(weekNum(ds)*7+dow(ds)+rot)%avail.length;
  const pool=[...avail]; for(let i=0;i<seed;i++) pool.push(pool.shift());
  const r={}; OPS.forEach((op,i)=>{r[op]=pool[i%pool.length].id;}); return r;
}
function assignCommon(ds,rot) {
  const avail=availableStaff(ds).filter(s=>!s.pt);
  const seed=(weekNum(ds)*13+dow(ds)+rot+3)%avail.length;
  const pool=[...avail]; for(let i=0;i<seed;i++) pool.push(pool.shift());
  const r={}; COMMON_TASKS.forEach((t,i)=>{r[t.id]=pool[i%pool.length].id;}); return r;
}
function choresByUser(uid,opA,comA) {
  const items=[];
  OPS.forEach(op=>{
    if(opA[op]===uid) OP_TASKS.forEach((t,i)=>items.push({id:`op_${op}_${i}`,label:t,freq:'daily',section:op}));
  });
  COMMON_TASKS.forEach(t=>{ if(comA[t.id]===uid) items.push({...t,section:'Common areas'}); });
  return items;
}
function allChores(opA,comA) {
  const items=[];
  OPS.forEach(op=>{ OP_TASKS.forEach((t,i)=>items.push({id:`op_${op}_${i}`,label:t,freq:'daily',section:op,assignee:opA[op]})); });
  COMMON_TASKS.forEach(t=>items.push({...t,section:'Common areas',assignee:comA[t.id]}));
  return items;
}

// ── NAV ────────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
async function loginAs(id) {
  currentUser=id; currentDate=todayStr();
  pendingChores.clear();
  showToast('Loading...');
  const fresh = await dbGet(currentDate);
  checked = fresh || {};
  if(id==='admin'){showScreen('screenAdmin');renderAdmin();}
  else{showScreen('screenStaff');renderStaff();}
  startPolling();
}
function logout() { stopPolling(); pendingChores.clear(); currentUser=null; showScreen('screenLogin'); renderLogin(); }
async function changeDate(n) {
  currentDate=addDays(currentDate,n);
  pendingChores.clear();
  syncTicket++;
  const fresh=await dbGet(currentDate);
  checked=fresh||{};
  renderAdmin();
}
function rotateAssign() {
  rotOffset=(rotOffset+1)%STAFF.length;
  localStorage.setItem('aic_rot',rotOffset);
  showToast('Assignments rotated');
  renderAdmin();
}
async function tap(choreId) {
  const was = !!checked[choreId];
  const newDone = !was;
  isSaving = true;
  try {
    syncTicket++;
    setSyncStatus(true, true);
    if (newDone) checked[choreId] = true; else delete checked[choreId];
    pendingChores.set(choreId, newDone);
    refreshCurrentView();
    const ok = await dbSet(currentDate, choreId, newDone);
    syncTicket++;
    if (!ok) {
      pendingChores.delete(choreId);
      if (!was) delete checked[choreId]; else checked[choreId] = true;
      refreshCurrentView();
      setSyncStatus(false, false);
      showToast('Sync error — check connection');
      return;
    }
    await pullSync();
  } finally {
    isSaving = false;
  }
}
function refreshCurrentView() {
  if(currentUser==='admin') renderAdmin();
  else if(currentUser) renderStaff();
}

// ── ADMIN PASSWORD ─────────────────────────────────────────
function showAdminLogin() {
  const modal = document.getElementById('adminModal');
  modal.style.display = 'flex';
  document.getElementById('adminPwInput').value = '';
  document.getElementById('adminPwError').style.display = 'none';
  setTimeout(() => document.getElementById('adminPwInput').focus(), 100);
}
function closeAdminModal() {
  document.getElementById('adminModal').style.display = 'none';
}
function checkAdminPw() {
  const val = document.getElementById('adminPwInput').value;
  if (val === ADMIN_PASSWORD) {
    closeAdminModal();
    loginAs('admin');
  } else {
    document.getElementById('adminPwError').style.display = 'block';
    document.getElementById('adminPwInput').value = '';
    document.getElementById('adminPwInput').focus();
  }
}

// ── RENDER LOGIN ───────────────────────────────────────────
function renderLogin() {
  document.getElementById('loginDate').textContent = dateLabel(todayStr());
  document.getElementById('staffGrid').innerHTML = STAFF.map(s=>{
    const unavail=s.pt&&!isJessicaDay(todayStr());
    return `<button class="staff-btn${unavail?' unavail':''}" onclick="loginAs('${s.id}')">
      <div class="avatar avatar-lg" style="background:${s.bg};color:${s.fg};margin:0 auto">${s.initials}</div>
      <div class="staff-btn-name">${s.name}</div>
      <div class="staff-btn-sub">${s.pt?'Part-time':'Full-time'}</div>
    </button>`;
  }).join('');
}

// ── RENDER STAFF ───────────────────────────────────────────
function renderStaff() {
  const opA=assignOps(currentDate,rotOffset), comA=assignCommon(currentDate,rotOffset);
  const s=STAFF.find(x=>x.id===currentUser);
  const chores=choresByUser(currentUser,opA,comA);
  document.getElementById('staffName').textContent=s.name;
  document.getElementById('staffDate').textContent=dateLabel(currentDate);
  const av=document.getElementById('staffAvatar');
  av.textContent=s.initials; av.style.background=s.bg; av.style.color=s.fg;
  const done=chores.filter(c=>checked[c.id]).length;
  const pct=chores.length?Math.round(done/chores.length*100):0;
  document.getElementById('staffProg').style.width=pct+'%';
  document.getElementById('staffProgLabel').textContent=`${done} of ${chores.length} tasks complete`;
  const sections={};
  chores.forEach(c=>{ if(!sections[c.section])sections[c.section]=[]; sections[c.section].push(c); });
  let html='';
  if(!chores.length){
    html=`<div style="text-align:center;padding:3rem 0;color:var(--hint);font-size:14px">No tasks assigned today.</div>`;
  } else {
    Object.entries(sections).forEach(([sec,items])=>{
      html+=`<div class="section-hdr">${sec}</div>`;
      items.forEach(c=>{ html+=choreCard(c,!!checked[c.id],true); });
    });
  }
  document.getElementById('staffChores').innerHTML=html;
}

// ── RENDER ADMIN ───────────────────────────────────────────
function renderAdmin() {
  const opA=assignOps(currentDate,rotOffset), comA=assignCommon(currentDate,rotOffset);
  const all=allChores(opA,comA);
  document.getElementById('adminDateSub').textContent=dateLabel(currentDate);
  document.getElementById('adminDateNav').textContent=dateLabelShort(currentDate);
  const totalDone=all.filter(t=>checked[t.id]).length;
  const pct=Math.round(totalDone/all.length*100);
  document.getElementById('adminStats').innerHTML=`
    <div class="stat-card"><div class="stat-val">${totalDone}/${all.length}</div><div class="stat-lbl">Tasks complete</div></div>
    <div class="stat-card"><div class="stat-val">${pct}%</div><div class="stat-lbl">Overall progress</div></div>`;
  let staffHTML='';
  STAFF.forEach(s=>{
    if(s.pt&&!isJessicaDay(currentDate)){
      staffHTML+=`<div class="staff-row">
        <div class="avatar" style="background:${s.bg};color:${s.fg}">${s.initials}</div>
        <div class="sr-info"><div class="sr-name">${s.name}</div><div class="sr-detail" style="color:var(--hint)">Not scheduled</div></div>
      </div>`; return;
    }
    const mine=choresByUser(s.id,opA,comA);
    const mdone=mine.filter(t=>checked[t.id]).length;
    const mpct=mine.length?Math.round(mdone/mine.length*100):0;
    const myOps=[...new Set(OPS.filter(op=>opA[op]===s.id))];
    staffHTML+=`<div class="staff-row">
      <div class="avatar" style="background:${s.bg};color:${s.fg}">${s.initials}</div>
      <div class="sr-info">
        <div class="sr-name">${s.name}${s.pt?' <span style="font-size:10px;color:var(--hint)">(PT)</span>':''}</div>
        <div class="sr-detail">${myOps.length?myOps.join(', '):'Common areas'} · ${mdone}/${mine.length}</div>
      </div>
      <div class="sr-right">
        <div class="sr-pct">${mpct}%</div>
        <div class="sr-bar-wrap"><div class="sr-bar" style="width:${mpct}%"></div></div>
      </div>
    </div>`;
  });
  document.getElementById('adminStaffRows').innerHTML=staffHTML;
  const sections={};
  all.forEach(t=>{ if(!sections[t.section])sections[t.section]=[]; sections[t.section].push(t); });
  let taskHTML='';
  Object.entries(sections).forEach(([sec,items])=>{
    taskHTML+=`<div class="section-hdr">${sec}</div>`;
    items.forEach(c=>{ const as=STAFF.find(x=>x.id===c.assignee); taskHTML+=choreCard(c,!!checked[c.id],false,as); });
  });
  document.getElementById('adminAllTasks').innerHTML=taskHTML;
}

// ── CHORE CARD ─────────────────────────────────────────────
function choreCard(c,isDone,clickable,assignee) {
  const ap=assignee?`<span style="font-size:11px;padding:3px 8px;border-radius:99px;background:${assignee.bg};color:${assignee.fg};font-weight:500;flex-shrink:0">${assignee.name}</span>`:'';
  return `<div class="chore-card${isDone?' done':''}${clickable?'':' readonly'}"${clickable?` onclick='tap(${JSON.stringify(c.id)})'`:''}>
    <div class="chk${isDone?' on':''}"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
    <span class="chore-label">${c.label}</span>
    <span class="pill pill-${c.freq}">${c.freq}</span>
    ${ap}
  </div>`;
}

// ── TOAST ──────────────────────────────────────────────────
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

// ── INIT ───────────────────────────────────────────────────
renderLogin();
</script>
